aid: zip
name: Zip
description: >-
  Zip is an AI-powered procurement orchestration platform that provides a REST
  API for managing the full intake-to-pay lifecycle. The API enables developers
  to build custom integrations that extract, create, and update procurement
  data including intake requests, vendor onboarding, approval workflows, and
  contract management. Authentication is handled via API keys passed as Basic
  Auth credentials, with separate sandbox and production environments available.
  Zip's platform serves enterprise customers by creating a single front door for
  all corporate purchase requests and routing them through configurable approval
  chains before connecting to ERPs and financial systems. The API supports
  webhook callbacks for async event notifications when procurement workflows
  complete, enabling deep integration with existing enterprise toolchains.
